name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests (Optional)
        working-directory: ./backend
        run: |
          # Add any pytest commands here
          echo "Running backend tests..."

      # Add your deployment steps here.
      # For example, to deploy to Render:
      # - name: Deploy to Render
      #   run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      
      - name: Echo Deployment Notice
        run: echo "Backend tests passed. Replace the deploy step with your provider (e.g. Render, Heroku, AWS Elastic Beanstalk) configuration."
