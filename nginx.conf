user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/log/nginx/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access_log main;

    sendfile        on;
    keepalive_timeout  65;

    # Rate Limiting Configuration
    # limit_req_zone: Limit REST API requests to 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # limit_req_zone: Limit sensitive endpoints (login, invite verification) to 1 request per second per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;
    
    # limit_conn_zone: Limit active WebSocket connections per IP
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    server {
        listen 80;
        server_name localhost;

        # Restrict client body size to prevent massive file uploads (Denial of Service)
        client_max_body_size 10M;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' ws: wss: http://host.docker.internal:11434;" always;

        # Serve frontend compiled SPA assets
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location /assets/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location = /sw.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location = /registerSW.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location = /manifest.webmanifest {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # Serve uploaded asset images and audio using the paths stored in the database.
        location /static/uploads/ {
            alias /usr/share/nginx/uploads/;
        }

        # Proxy sensitive authentication and invite endpoints (Rate Limited)
        location ~ ^/api/(auth/login|invite/verify)$ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy general REST API requests (Rate Limited)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://app:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # AI vision/appraisal calls can take well over the 60s nginx default,
            # especially with multiple secondary images — avoid premature 504s.
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Proxy WebSocket connections (Rate Limited by Connection Count)
        location ~ ^/api/sessions/([^/]+)/ws$ {
            limit_conn addr_limit 3; # Max 3 concurrent WebSocket connections per IP
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
