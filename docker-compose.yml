version: '3.8'

services:
  app:
    build: ./backend
    restart: always
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-ollama}
      - VISION_PROVIDER=${VISION_PROVIDER:-ollama}
      - FAST_THINKER_MODEL=${FAST_THINKER_MODEL:-qwen3:8b}
      - SLOW_THINKER_MODEL=${SLOW_THINKER_MODEL:-qwen3:14b}
      - VISION_MODEL=${VISION_MODEL:-qwen3-vl:8b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - DB_URL=postgresql+psycopg2://postgres:postgres@db:5432/estate
      - 'ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required. Run scripts/start_local.sh or generate one with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"}'
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - STORAGE_DRIVER=LOCAL
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONIOENCODING=utf-8
      - PYTHONUTF8=1
      - DB_ECHO=${DB_ECHO:-false}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-false}
      - SMTP_SENDER=${SMTP_SENDER:-${SMTP_FROM:-estate-steward@localhost}}
      - KOKORO_MODEL_PATH=/app/models/kokoro-v1.0.onnx
      - KOKORO_VOICES_PATH=/app/models/voices.json
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/static/uploads
      - ./backend/app/models:/app/models
    depends_on:
      - db
      - mailpit
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=estate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  langfuse:
    image: langfuse/langfuse:2
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/langfuse
      - NEXTAUTH_SECRET=my-secret-key-must-be-very-secure
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/usr/share/nginx/uploads:ro
    ports:
      - "80:80"
    depends_on:
      - app

# T74: Cloudflare Tunnel for secure public exposure (outbound-only, no open ports)
  # To activate: create a tunnel in Cloudflare Zero Trust dashboard (~5 min)
  #   https://one.dash.cloudflare.com → Networks → Tunnels → Create Tunnel
  # Copy the tunnel token and set CLOUDFLARE_TUNNEL_TOKEN in .env
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    network_mode: "host"
    profiles:
      - tunnel

volumes:
  pgdata:
  uploads_data:
